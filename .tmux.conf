# ============================================================================
# ~/.tmux.conf  —  tmux config tuned for long-running remote ML jobs
# ----------------------------------------------------------------------------
# tmux is your safety net: SSH drops won't kill a training run that's inside a
# tmux session. This config keeps the default C-b prefix (so it never fights
# with readline's C-a = beginning-of-line) but adds a lot of QoL.
# Works with stock tmux; the optional TPM plugin block at the bottom is guarded.
# ============================================================================

# --- Colors / terminal ------------------------------------------------------
set -g default-terminal "tmux-256color"
# True color passthrough so vim/starship colors look right inside tmux.
set -ga terminal-overrides ",*256col*:Tc,xterm-256color:Tc"
set -g focus-events on        # let vim's autoread react to focus changes

# --- General behavior -------------------------------------------------------
set -g mouse on               # click panes, drag borders, scroll
set -g history-limit 100000   # huge scrollback for reading job logs
set -g base-index 1           # windows start at 1 (easier to reach)
setw -g pane-base-index 1
set -g renumber-windows on    # keep window numbers gap-free
setw -g automatic-rename off  # keep the names YOU give windows
set -g set-titles on          # update the terminal/title bar
set -sg escape-time 10        # near-zero delay so Esc in vim is snappy
set -g display-time 2000      # status messages linger 2s

# --- Reload config without restarting tmux ----------------------------------
unbind r
bind r source-file ~/.tmux.conf \; display "tmux config reloaded"

# --- Splits with intuitive keys; new panes/windows inherit the cwd ----------
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"   # prefix | = vertical split
bind - split-window -v -c "#{pane_current_path}"    # prefix - = horizontal split
bind c new-window -c "#{pane_current_path}"

# Move between panes with prefix + h/j/k/l (vim-style)
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R
# Resize panes with prefix + Shift-H/J/K/L (repeatable)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# --- Copy mode: vi keys, copy to system clipboard ---------------------------
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
# On macOS, pipe to pbcopy if present (harmless elsewhere)
if-shell "command -v pbcopy" \
  "bind -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'"

# --- Status bar: minimal, with hostname (vital when juggling many clusters) -
set -g status-interval 5
set -g status-justify left
set -g status-style "bg=default,fg=white"
set -g status-left-length 40
set -g status-left "#[fg=green,bold]#S #[default]"          # session name
set -g status-right "#[fg=cyan]#H #[fg=yellow]%Y-%m-%d %H:%M"  # host + clock
setw -g window-status-current-style "fg=black,bg=green,bold"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format " #I:#W "

# ============================================================================
# OPTIONAL: TPM (Tmux Plugin Manager). Only initializes if installed:
#   git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
#   then press  prefix + I  to install the plugins below.
# tmux-resurrect/continuum let you persist & auto-restore sessions across
# reboots — handy on a workstation, optional on HPC.
# ============================================================================
if-shell "test -d ~/.tmux/plugins/tpm" \
  "set -g @plugin 'tmux-plugins/tpm'; \
   set -g @plugin 'tmux-plugins/tmux-resurrect'; \
   set -g @plugin 'tmux-plugins/tmux-continuum'; \
   set -g @continuum-restore 'on'; \
   run '~/.tmux/plugins/tpm/tpm'"
